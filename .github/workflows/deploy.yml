name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refetch:
        description: "Re-scrape ECI data before deploying"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install curl_cffi beautifulsoup4

      - name: Re-scrape ECI data
        if: ${{ inputs.refetch == true }}
        run: |
          python fetch_eci_results.py
          python analyze_eci.py
          python convert_to_json.py

      - name: Rebuild JSON from existing CSVs
        if: ${{ inputs.refetch != true }}
        run: python convert_to_json.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
